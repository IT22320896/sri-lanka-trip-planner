research_task:
  description: >
    You are researching this trip request: {user_request}.

    The trip details are:
    - Origin: {origin}
    - Destination: {destination}
    - Group size: {group_size}
    - Duration: {duration_days} days
    - Travel dates: {travel_dates}
    - Budget focus: {budget_focus}
    - Current date: {current_date}

    IMPORTANT: You MUST call the get_weather_and_attractions tool exactly
    once with destination="{destination}" and date="{current_date}".
    Do NOT use any other date. Do NOT skip the tool call. Use the Action
    and Action Input format to call it.

    After receiving the tool result, return a JSON object using the real
    data from the tool.
  expected_output: >
    A JSON object with these exact keys: origin, destination, group_size,
    duration_days, travel_dates, budget_focus, weather (from tool),
    attractions (from tool), transport_notes, and research_sources.
    All weather and attraction data MUST come from the tool output.
  agent: research_agent

budget_task:
  description: >
    You have research data from the previous task. Now you MUST call the
    calculate_trip_budget tool with these exact parameters:
    - people: {group_size}
    - destination: "{destination}"
    - days: {duration_days}

    Do NOT skip the tool call. Do NOT make up budget numbers. Use the
    Action and Action Input format to call the tool. After receiving the
    result, return the tool output directly as your final answer.
  expected_output: >
    The JSON object returned by the calculate_trip_budget tool, which
    includes: budget_breakdown, total_lkr, total_usd, budget_file,
    exchange_rate_lkr_per_usd, and assumptions.
  agent: budget_agent

itinerary_task:
  description: >
    You have research and budget data from previous tasks. Now you MUST
    call the create_itinerary_file tool with a plan_data dictionary.

    Build the plan_data dict with these keys:
    - origin: "{origin}"
    - destination: "{destination}"
    - days: {duration_days}
    - group_size: {group_size}
    - travel_dates: {travel_dates}
    - budget: (the budget JSON from the previous task)
    - weather: (the weather data from research)
    - attractions: (the attractions list from research)

    Do NOT skip the tool call. Do NOT write the itinerary yourself. Use
    the Action and Action Input format to call the tool. After receiving
    the file path, report it as your final answer.
  expected_output: >
    A JSON object with keys: itinerary_path (the file path returned by
    the tool), plan_summary, and budget_file.
  agent: itinerary_agent

review_task:
  description: >
    You have the itinerary file path from the previous task. Now you MUST
    call the validate_plan tool with the itinerary_path string.

    Do NOT skip the tool call. Use the Action and Action Input format to
    call it. After receiving validation results, write a clean final
    markdown report with these sections:

    ## Summary
    Brief trip overview.

    ## Itinerary
    Reference the itinerary file path.

    ## Budget Highlights
    Key budget numbers from the budget task.

    ## Validation Results
    Results from the validate_plan tool.

    ## Next Steps
    Actionable follow-ups.

    Do NOT wrap the report in code fences.
  expected_output: >
    A clean markdown report with Summary, Itinerary, Budget Highlights,
    Validation Results, and Next Steps sections. All data must come from
    actual tool outputs, not invented content.
  agent: reviewer_agent
