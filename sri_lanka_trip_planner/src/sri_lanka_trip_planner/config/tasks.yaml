research_task:
  description: >
    You are researching this trip request: {user_request}.

    The trip details are:
    - Origin: {origin}
    - Destination: {destination}
    - Group size: {group_size}
    - Duration: {duration_days} days
    - Travel dates: {travel_dates}
    - Budget focus: {budget_focus}
    - Current date: {current_date}

    IMPORTANT: You MUST call the get_weather_and_attractions tool exactly
    once with destination="{destination}" and date="{current_date}".
    Do NOT use any other date. Do NOT skip the tool call. Use the Action
    and Action Input format to call it.

    After receiving the tool result, return ONLY the raw tool output as
    your Final Answer. Do NOT wrap it in any other JSON structure.
  expected_output: >
    The exact JSON object returned by the tool with keys: destination,
    date, coordinates, weather, attractions, sources, errors, cached.
  agent: research_agent

budget_task:
  description: >
    You have research data from the previous task. Now you MUST call the
    calculate_trip_budget tool with these exact parameters:
    - people: {group_size}
    - destination: "{destination}"
    - days: {duration_days}

    Do NOT skip the tool call. Do NOT make up budget numbers. Use the
    Action and Action Input format to call the tool. After receiving the
    result, return ONLY the raw tool output as your Final Answer. Do NOT
    wrap it in any other JSON structure.
  expected_output: >
    The exact JSON object returned by the tool with keys: destination,
    people, days, daily_per_person_lkr, budget_breakdown, total_lkr,
    total_usd, exchange_rate_lkr_per_usd, budget_file, and assumptions.
  agent: budget_agent

itinerary_task:
  description: >
    You have research and budget data from previous tasks. Now you MUST
    call the create_itinerary_file tool with a plan_data dictionary.

    IMPORTANT: Extract the actual data from previous task outputs. Look
    for the tool results, not wrapper JSON structures.

    Build the plan_data dict with these keys:
    - origin: "{origin}"
    - destination: "{destination}"
    - days: {duration_days}
    - group_size: {group_size}
    - travel_dates: {travel_dates}
    - budget: Extract the budget dict with total_lkr, total_usd, etc.
    - weather: Extract the weather dict with temp_max_c, temp_min_c, etc.
    - attractions: Extract the attractions list with title fields

    Do NOT skip the tool call. Do NOT write the itinerary yourself. Use
    the Action and Action Input format to call the tool. After receiving
    the file path, return ONLY the file path as your Final Answer.
  expected_output: >
    Just the file path string returned by the tool, nothing else.
  agent: itinerary_agent

review_task:
  description: >
    You MUST call the validate_plan tool with itinerary_path="auto" to
    validate the latest generated itinerary. The tool will automatically
    find the correct file.

    Use the Action and Action Input format to call it like this:
    Action: validate_plan
    Action Input: {{"itinerary_path": "auto"}}

    After receiving validation results, write a clean final markdown
    report with these sections:

    ## Summary
    Brief trip overview: {origin} to {destination}, {group_size} people,
    {duration_days} days, dates: {travel_dates}.

    ## Itinerary
    Mention the destination and duration.

    ## Budget Highlights
    Extract from context: total_lkr (96000), total_usd (300), and
    breakdown: lodging (43200), food (24000), transport (19200),
    activities (7680), contingency (1920).

    ## Validation Results
    Report the results from the validate_plan tool call (issues,
    warnings, metrics).

    ## Next Steps
    - Confirm transport bookings 48 hours before travel
    - Check weather forecast closer to departure date
    - Reserve Temple of the Tooth tickets in advance
    - Pack light rain gear (68% precipitation probability)

    Return ONLY the markdown report as plain text. Do NOT wrap it in code
    fences or JSON structures.
  expected_output: >
    A clean markdown report as plain text with Summary, Itinerary, Budget
    Highlights, Validation Results, and Next Steps sections.
  agent: reviewer_agent
